<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Convertor</title>
    <style>
        :root {
            --bg: #f3f5f9;
            --card: #ffffff;
            --ink: #111827;
            --muted: #667085;
            --accent: #e5322d;
            --border: #e5e7eb;
            --shadow: 0 18px 42px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top center, rgba(229, 50, 45, 0.10), transparent 20%),
                linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
        }

        .page {
            width: min(100%, 1220px);
            margin: 0 auto;
            padding: 42px 24px 64px;
        }

        .hero {
            text-align: center;
            margin-bottom: 34px;
        }

        .eyebrow {
            display: inline-block;
            padding: 8px 14px;
            border-radius: 999px;
            background: #fff1f0;
            color: var(--accent);
            font-size: 0.88rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        h1 {
            margin: 18px 0 12px;
            font-size: clamp(2.3rem, 5vw, 4.3rem);
            line-height: 0.95;
        }

        .hero p {
            max-width: 760px;
            margin: 0 auto;
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.7;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 260px));
            gap: 18px;
            justify-content: center;
        }

        .tool-card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            border-color: rgba(229, 50, 45, 0.30);
            box-shadow: 0 24px 54px rgba(229, 50, 45, 0.14);
        }

        .tool-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: grid;
            place-items: center;
            margin-bottom: 16px;
            background: linear-gradient(180deg, #fff1f0 0%, #ffe2df 100%);
            color: var(--accent);
            font-size: 1.05rem;
            font-weight: 900;
        }

        .tool-card h2 {
            margin: 0 0 8px;
            font-size: 1.2rem;
        }

        .tool-card p {
            margin: 0 0 16px;
            color: var(--muted);
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .tool-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            color: #344054;
            font-weight: 700;
            font-size: 0.92rem;
        }

        .pill {
            padding: 6px 10px;
            border-radius: 999px;
            background: #f2f4f7;
            font-size: 0.82rem;
        }

        @media (max-width: 640px) {
            .page {
                padding-top: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        

        <section class="grid">
            {% for operation_key, operation in operations.items() %}
            <a class="tool-card" href="/operacoes/{{ operation.slug }}">
                <div class="tool-icon">PDF</div>
                <h2>{{ operation.title }}</h2>
                <p>{{ operation.subtitle }}</p>
                <div class="tool-footer">
                    <span class="pill">{{ operation.accept }}</span>
                    <span>Abrir ferramenta -></span>
                </div>
            </a>
            {% endfor %}
        </section>
    </div>
</body>
</html>
